name: PR Welcome Guard

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  welcome-and-check:
    name: Welcome And Check PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Welcome contributor
        run: npm run pr:welcome
        env:
          MAINTAINER_TOKEN: ${{ secrets.MAINTAINER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
